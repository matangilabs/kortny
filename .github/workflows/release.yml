name: Release

# Build and publish both Kortny images to GHCR on a version tag push.
#
#   - ghcr.io/boffti/kortny              (app image, docker/kortny.Dockerfile)
#   - ghcr.io/boffti/kortny-sandbox-exec (sandbox execution image, HIG-239)
#
# Each image is tagged with the version (from the git tag, e.g. v1.2.3 -> 1.2.3)
# and `latest`.
#
# Design note (HIG-200): the app image is intentionally NOT built in ci.yml on
# every PR. A multi-stage uv build with system-package layers does not reliably
# stay under the ~3-minute budget the plan set for keeping CI fast, so image
# builds are confined to tagged releases here. Compose `config` validation and
# the GC/unit tests already cover the prod artifacts on every PR.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build and push images
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: app
            image: ghcr.io/boffti/kortny
            dockerfile: docker/kortny.Dockerfile
          - name: sandbox-exec
            image: ghcr.io/boffti/kortny-sandbox-exec
            dockerfile: docker/sandbox-exec.Dockerfile
    steps:
      - uses: actions/checkout@v6

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ matrix.image }}:${{ steps.version.outputs.version }}
            ${{ matrix.image }}:latest
          build-args: |
            KORTNY_VERSION=${{ steps.version.outputs.version }}
            KORTNY_REVISION=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          labels: |
            org.opencontainers.image.source=https://github.com/boffti/kortny
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
