services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kortny}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kortny}
      POSTGRES_USER: ${POSTGRES_USER:-kortny}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  migrate:
    image: ghcr.io/astral-sh/uv:python3.11-bookworm-slim
    working_dir: /app
    command: ["uv", "run", "alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_URL: postgresql://${POSTGRES_USER:-kortny}:${POSTGRES_PASSWORD:-kortny}@postgres:5432/${POSTGRES_DB:-kortny}
      UV_CACHE_DIR: /tmp/uv-cache
      UV_LINK_MODE: copy
      UV_PROJECT_ENVIRONMENT: /tmp/kortny-venv
    volumes:
      - .:/app
      - uv-cache:/tmp/uv-cache

  app:
    image: ghcr.io/astral-sh/uv:python3.11-bookworm-slim
    working_dir: /app
    command: ["uv", "run", "python", "-m", "kortny.slack"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      OBSERVABILITY_ENABLED: ${OBSERVABILITY_ENABLED:-true}
      OBSERVABILITY_CAPTURE_CONTENT: ${OBSERVABILITY_CAPTURE_CONTENT:-metadata}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
      OTEL_SERVICE_NAME: ${OTEL_APP_SERVICE_NAME:-kortny-app}
      OTEL_TRACE_SAMPLING_RATIO: ${OTEL_TRACE_SAMPLING_RATIO:-1.0}
      POSTGRES_URL: postgresql://${POSTGRES_USER:-kortny}:${POSTGRES_PASSWORD:-kortny}@postgres:5432/${POSTGRES_DB:-kortny}
      UV_CACHE_DIR: /tmp/uv-cache
      UV_LINK_MODE: copy
      UV_PROJECT_ENVIRONMENT: /tmp/kortny-venv
    volumes:
      - .:/app
      - uv-cache:/tmp/uv-cache

  worker:
    image: ghcr.io/astral-sh/uv:python3.11-bookworm-slim
    working_dir: /app
    command: ["uv", "run", "python", "-m", "kortny.worker"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      OBSERVABILITY_ENABLED: ${OBSERVABILITY_ENABLED:-true}
      OBSERVABILITY_CAPTURE_CONTENT: ${OBSERVABILITY_CAPTURE_CONTENT:-metadata}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
      OTEL_SERVICE_NAME: ${OTEL_WORKER_SERVICE_NAME:-kortny-worker}
      OTEL_TRACE_SAMPLING_RATIO: ${OTEL_TRACE_SAMPLING_RATIO:-1.0}
      POSTGRES_URL: postgresql://${POSTGRES_USER:-kortny}:${POSTGRES_PASSWORD:-kortny}@postgres:5432/${POSTGRES_DB:-kortny}
      UV_CACHE_DIR: /tmp/uv-cache
      UV_LINK_MODE: copy
      UV_PROJECT_ENVIRONMENT: /tmp/kortny-venv
    volumes:
      - .:/app
      - uv-cache:/tmp/uv-cache

  dashboard:
    image: ghcr.io/astral-sh/uv:python3.11-bookworm-slim
    working_dir: /app
    command:
      [
        "uv",
        "run",
        "uvicorn",
        "kortny.dashboard.app:create_app",
        "--factory",
        "--host",
        "0.0.0.0",
        "--port",
        "8080",
      ]
    depends_on:
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      DASHBOARD_AUTH_MODE: ${DASHBOARD_AUTH_MODE:-bootstrap}
      DASHBOARD_USERNAME: ${DASHBOARD_USERNAME:-kortny}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD:-change-me}
      DASHBOARD_SESSION_SECRET: ${DASHBOARD_SESSION_SECRET:-change-me-dashboard-session-secret}
      DASHBOARD_SECURE_COOKIES: ${DASHBOARD_SECURE_COOKIES:-false}
      DASHBOARD_SLACK_CLIENT_ID: ${DASHBOARD_SLACK_CLIENT_ID:-}
      DASHBOARD_SLACK_CLIENT_SECRET: ${DASHBOARD_SLACK_CLIENT_SECRET:-}
      DASHBOARD_SLACK_REDIRECT_URI: ${DASHBOARD_SLACK_REDIRECT_URI:-}
      DASHBOARD_SLACK_OAUTH_STATE_TTL_MINUTES: ${DASHBOARD_SLACK_OAUTH_STATE_TTL_MINUTES:-10}
      POSTGRES_URL: postgresql://${POSTGRES_USER:-kortny}:${POSTGRES_PASSWORD:-kortny}@postgres:5432/${POSTGRES_DB:-kortny}
      UV_CACHE_DIR: /tmp/uv-cache
      UV_LINK_MODE: copy
      UV_PROJECT_ENVIRONMENT: /tmp/kortny-venv
    ports:
      - "127.0.0.1:${DASHBOARD_HOST_PORT:-8080}:8080"
    volumes:
      - .:/app
      - uv-cache:/tmp/uv-cache

  phoenix:
    image: ${PHOENIX_IMAGE:-arizephoenix/phoenix:latest}
    profiles:
      - observability
    environment:
      PHOENIX_HOST: 0.0.0.0
      PHOENIX_PORT: 6006
      PHOENIX_GRPC_PORT: 4317
      PHOENIX_WORKING_DIR: /mnt/data
      PHOENIX_SQL_DATABASE_URL: ${PHOENIX_SQL_DATABASE_URL:-sqlite:////mnt/data/phoenix.db}
      PHOENIX_DEFAULT_RETENTION_POLICY_DAYS: ${PHOENIX_DEFAULT_RETENTION_POLICY_DAYS:-30}
      PHOENIX_TELEMETRY_ENABLED: ${PHOENIX_TELEMETRY_ENABLED:-false}
    ports:
      - "${PHOENIX_HOST_PORT:-6006}:6006"
      - "127.0.0.1:${PHOENIX_GRPC_HOST_PORT:-4317}:4317"
    volumes:
      - phoenix-data:/mnt/data

  temporal:
    image: ${TEMPORAL_IMAGE:-temporalio/temporal:latest}
    profiles:
      - workflow
    command: ["server", "start-dev", "--ip", "0.0.0.0"]
    ports:
      - "${TEMPORAL_HOST_PORT:-7233}:7233"
      - "127.0.0.1:${TEMPORAL_UI_HOST_PORT:-8233}:8233"

  temporal-worker:
    image: ghcr.io/astral-sh/uv:python3.11-bookworm-slim
    profiles:
      - workflow
    working_dir: /app
    command: ["uv", "run", "python", "-m", "kortny.workflow"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      temporal:
        condition: service_started
    env_file:
      - .env
    environment:
      KORTNY_WORKFLOW_BACKEND: temporal
      TEMPORAL_ADDRESS: ${TEMPORAL_ADDRESS:-temporal:7233}
      TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE:-default}
      TEMPORAL_TASK_QUEUE: ${TEMPORAL_TASK_QUEUE:-kortny-workflows}
      OBSERVABILITY_ENABLED: ${OBSERVABILITY_ENABLED:-true}
      OBSERVABILITY_CAPTURE_CONTENT: ${OBSERVABILITY_CAPTURE_CONTENT:-metadata}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
      OTEL_SERVICE_NAME: ${OTEL_TEMPORAL_WORKER_SERVICE_NAME:-kortny-temporal-worker}
      OTEL_TRACE_SAMPLING_RATIO: ${OTEL_TRACE_SAMPLING_RATIO:-1.0}
      POSTGRES_URL: postgresql://${POSTGRES_USER:-kortny}:${POSTGRES_PASSWORD:-kortny}@postgres:5432/${POSTGRES_DB:-kortny}
      UV_CACHE_DIR: /tmp/uv-cache
      UV_LINK_MODE: copy
      UV_PROJECT_ENVIRONMENT: /tmp/kortny-venv
    volumes:
      - .:/app
      - uv-cache:/tmp/uv-cache

volumes:
  postgres-data:
  phoenix-data:
  uv-cache:
