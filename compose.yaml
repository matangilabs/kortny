services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kortny}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kortny}
      POSTGRES_USER: ${POSTGRES_USER:-kortny}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  migrate:
    image: ghcr.io/astral-sh/uv:python3.11-bookworm-slim
    working_dir: /app
    command: ["uv", "run", "alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_URL: postgresql://${POSTGRES_USER:-kortny}:${POSTGRES_PASSWORD:-kortny}@postgres:5432/${POSTGRES_DB:-kortny}
      UV_CACHE_DIR: /tmp/uv-cache
      UV_LINK_MODE: copy
      UV_PROJECT_ENVIRONMENT: /tmp/kortny-venv
    volumes:
      - .:/app
      - uv-cache:/tmp/uv-cache

  app:
    image: ghcr.io/astral-sh/uv:python3.11-bookworm-slim
    working_dir: /app
    command: ["uv", "run", "python", "-m", "kortny.slack"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      OBSERVABILITY_ENABLED: ${OBSERVABILITY_ENABLED:-true}
      OBSERVABILITY_CAPTURE_CONTENT: ${OBSERVABILITY_CAPTURE_CONTENT:-metadata}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
      OTEL_SERVICE_NAME: ${OTEL_APP_SERVICE_NAME:-kortny-app}
      OTEL_TRACE_SAMPLING_RATIO: ${OTEL_TRACE_SAMPLING_RATIO:-1.0}
      POSTGRES_URL: postgresql://${POSTGRES_USER:-kortny}:${POSTGRES_PASSWORD:-kortny}@postgres:5432/${POSTGRES_DB:-kortny}
      UV_CACHE_DIR: /tmp/uv-cache
      UV_LINK_MODE: copy
      UV_PROJECT_ENVIRONMENT: /tmp/kortny-venv
    volumes:
      - .:/app
      - uv-cache:/tmp/uv-cache

  worker:
    image: ghcr.io/astral-sh/uv:python3.11-bookworm-slim
    working_dir: /app
    command: ["uv", "run", "python", "-m", "kortny.worker"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      OBSERVABILITY_ENABLED: ${OBSERVABILITY_ENABLED:-true}
      OBSERVABILITY_CAPTURE_CONTENT: ${OBSERVABILITY_CAPTURE_CONTENT:-metadata}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
      OTEL_SERVICE_NAME: ${OTEL_WORKER_SERVICE_NAME:-kortny-worker}
      OTEL_TRACE_SAMPLING_RATIO: ${OTEL_TRACE_SAMPLING_RATIO:-1.0}
      POSTGRES_URL: postgresql://${POSTGRES_USER:-kortny}:${POSTGRES_PASSWORD:-kortny}@postgres:5432/${POSTGRES_DB:-kortny}
      UV_CACHE_DIR: /tmp/uv-cache
      UV_LINK_MODE: copy
      UV_PROJECT_ENVIRONMENT: /tmp/kortny-venv
    volumes:
      - .:/app
      - uv-cache:/tmp/uv-cache

  phoenix:
    image: ${PHOENIX_IMAGE:-arizephoenix/phoenix:latest}
    profiles:
      - observability
    environment:
      PHOENIX_HOST: 0.0.0.0
      PHOENIX_PORT: 6006
      PHOENIX_GRPC_PORT: 4317
      PHOENIX_WORKING_DIR: /mnt/data
      PHOENIX_SQL_DATABASE_URL: ${PHOENIX_SQL_DATABASE_URL:-sqlite:////mnt/data/phoenix.db}
      PHOENIX_DEFAULT_RETENTION_POLICY_DAYS: ${PHOENIX_DEFAULT_RETENTION_POLICY_DAYS:-30}
      PHOENIX_TELEMETRY_ENABLED: ${PHOENIX_TELEMETRY_ENABLED:-false}
    ports:
      - "${PHOENIX_HOST_PORT:-6006}:6006"
      - "127.0.0.1:${PHOENIX_GRPC_HOST_PORT:-4317}:4317"
    volumes:
      - phoenix-data:/mnt/data

volumes:
  postgres-data:
  phoenix-data:
  uv-cache:
