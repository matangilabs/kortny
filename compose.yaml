services:
  postgres:
    # pgvector required for tool/skill embeddings (HIG-219); bookworm pinned
    # because the unsuffixed pg16 tag tracks trixie.
    image: pgvector/pgvector:pg16-bookworm
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kortny}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kortny}
      POSTGRES_USER: ${POSTGRES_USER:-kortny}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  migrate:
    image: ghcr.io/astral-sh/uv:python3.11-bookworm-slim
    working_dir: /app
    command: ["uv", "run", "alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_URL: postgresql://${POSTGRES_USER:-kortny}:${POSTGRES_PASSWORD:-kortny}@postgres:5432/${POSTGRES_DB:-kortny}
      UV_CACHE_DIR: /tmp/uv-cache
      UV_LINK_MODE: copy
      UV_PROJECT_ENVIRONMENT: /tmp/kortny-venv
    volumes:
      - .:/app
      - uv-cache:/tmp/uv-cache

  app:
    image: ghcr.io/astral-sh/uv:python3.11-bookworm-slim
    working_dir: /app
    command: ["uv", "run", "python", "-m", "kortny.slack"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      OBSERVABILITY_ENABLED: ${OBSERVABILITY_ENABLED:-true}
      OBSERVABILITY_CAPTURE_CONTENT: ${OBSERVABILITY_CAPTURE_CONTENT:-metadata}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
      OTEL_SERVICE_NAME: ${OTEL_APP_SERVICE_NAME:-kortny-app}
      OTEL_TRACE_SAMPLING_RATIO: ${OTEL_TRACE_SAMPLING_RATIO:-1.0}
      POSTGRES_URL: postgresql://${POSTGRES_USER:-kortny}:${POSTGRES_PASSWORD:-kortny}@postgres:5432/${POSTGRES_DB:-kortny}
      UV_CACHE_DIR: /tmp/uv-cache
      UV_LINK_MODE: copy
      UV_PROJECT_ENVIRONMENT: /tmp/kortny-venv
    volumes:
      - .:/app
      - uv-cache:/tmp/uv-cache

  worker:
    image: ghcr.io/astral-sh/uv:python3.11-bookworm-slim
    working_dir: /app
    command: ["uv", "run", "python", "-m", "kortny.worker"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      sandbox-runner:
        condition: service_healthy
    env_file:
      - .env
    environment:
      OBSERVABILITY_ENABLED: ${OBSERVABILITY_ENABLED:-true}
      OBSERVABILITY_CAPTURE_CONTENT: ${OBSERVABILITY_CAPTURE_CONTENT:-metadata}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
      OTEL_SERVICE_NAME: ${OTEL_WORKER_SERVICE_NAME:-kortny-worker}
      OTEL_TRACE_SAMPLING_RATIO: ${OTEL_TRACE_SAMPLING_RATIO:-1.0}
      KORTNY_SANDBOX_RUNNER_URL: ${KORTNY_SANDBOX_RUNNER_URL:-http://sandbox-runner:8090}
      KORTNY_SANDBOX_RUNNER_TIMEOUT_SECONDS: ${KORTNY_SANDBOX_RUNNER_TIMEOUT_SECONDS:-70}
      KORTNY_SANDBOX_DEFAULT_IMAGE: ${KORTNY_SANDBOX_DEFAULT_IMAGE:-ghcr.io/astral-sh/uv:python3.11-bookworm-slim}
      KORTNY_ARTIFACTS_DIR: ${KORTNY_ARTIFACTS_DIR:-/data/artifacts}
      KORTNY_PUBLIC_BASE_URL: ${KORTNY_PUBLIC_BASE_URL:-}
      KORTNY_PREVIEW_SIGNING_SECRET: ${KORTNY_PREVIEW_SIGNING_SECRET:-}
      FASTEMBED_CACHE_PATH: ${FASTEMBED_CACHE_PATH:-/data/fastembed-cache}
      POSTGRES_URL: postgresql://${POSTGRES_USER:-kortny}:${POSTGRES_PASSWORD:-kortny}@postgres:5432/${POSTGRES_DB:-kortny}
      UV_CACHE_DIR: /tmp/uv-cache
      UV_LINK_MODE: copy
      UV_PROJECT_ENVIRONMENT: /tmp/kortny-venv
    volumes:
      - .:/app
      - uv-cache:/tmp/uv-cache
      - task-artifacts:/data/artifacts
      - fastembed-cache:/data/fastembed-cache

  scheduler:
    image: ghcr.io/astral-sh/uv:python3.11-bookworm-slim
    working_dir: /app
    command: ["uv", "run", "python", "-m", "kortny.scheduler"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      KORTNY_SCHEDULER_POLL_INTERVAL_SECONDS: ${KORTNY_SCHEDULER_POLL_INTERVAL_SECONDS:-5}
      KORTNY_SCHEDULER_MATERIALIZE_LIMIT: ${KORTNY_SCHEDULER_MATERIALIZE_LIMIT:-50}
      KORTNY_SCHEDULER_ADVISORY_LOCK_KEY: ${KORTNY_SCHEDULER_ADVISORY_LOCK_KEY:-759340185}
      OBSERVABILITY_ENABLED: ${OBSERVABILITY_ENABLED:-true}
      OBSERVABILITY_CAPTURE_CONTENT: ${OBSERVABILITY_CAPTURE_CONTENT:-metadata}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
      OTEL_SERVICE_NAME: ${OTEL_SCHEDULER_SERVICE_NAME:-kortny-scheduler}
      OTEL_TRACE_SAMPLING_RATIO: ${OTEL_TRACE_SAMPLING_RATIO:-1.0}
      POSTGRES_URL: postgresql://${POSTGRES_USER:-kortny}:${POSTGRES_PASSWORD:-kortny}@postgres:5432/${POSTGRES_DB:-kortny}
      UV_CACHE_DIR: /tmp/uv-cache
      UV_LINK_MODE: copy
      UV_PROJECT_ENVIRONMENT: /tmp/kortny-venv
    volumes:
      - .:/app
      - uv-cache:/tmp/uv-cache

  witness:
    image: ghcr.io/astral-sh/uv:python3.11-bookworm-slim
    working_dir: /app
    command: ["uv", "run", "python", "-m", "kortny.witness"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      KORTNY_WITNESS_ENABLED: ${KORTNY_WITNESS_ENABLED:-true}
      KORTNY_WITNESS_DELIVER_PRIVATE: ${KORTNY_WITNESS_DELIVER_PRIVATE:-false}
      KORTNY_WITNESS_POLL_INTERVAL_SECONDS: ${KORTNY_WITNESS_POLL_INTERVAL_SECONDS:-300}
      KORTNY_WITNESS_PROFILE_SCAN_LIMIT: ${KORTNY_WITNESS_PROFILE_SCAN_LIMIT:-10}
      KORTNY_WITNESS_DELIVERY_LIMIT: ${KORTNY_WITNESS_DELIVERY_LIMIT:-5}
      KORTNY_WITNESS_SCAN_INTERVAL_SECONDS: ${KORTNY_WITNESS_SCAN_INTERVAL_SECONDS:-21600}
      OBSERVABILITY_ENABLED: ${OBSERVABILITY_ENABLED:-true}
      OBSERVABILITY_CAPTURE_CONTENT: ${OBSERVABILITY_CAPTURE_CONTENT:-metadata}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
      OTEL_SERVICE_NAME: ${OTEL_WITNESS_SERVICE_NAME:-kortny-witness}
      OTEL_TRACE_SAMPLING_RATIO: ${OTEL_TRACE_SAMPLING_RATIO:-1.0}
      POSTGRES_URL: postgresql://${POSTGRES_USER:-kortny}:${POSTGRES_PASSWORD:-kortny}@postgres:5432/${POSTGRES_DB:-kortny}
      UV_CACHE_DIR: /tmp/uv-cache
      UV_LINK_MODE: copy
      UV_PROJECT_ENVIRONMENT: /tmp/kortny-venv
    volumes:
      - .:/app
      - uv-cache:/tmp/uv-cache

  consolidator:
    image: ghcr.io/astral-sh/uv:python3.11-bookworm-slim
    working_dir: /app
    command: ["uv", "run", "python", "-m", "kortny.consolidator"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      KORTNY_CONSOLIDATOR_ENABLED: ${KORTNY_CONSOLIDATOR_ENABLED:-true}
      KORTNY_CONSOLIDATOR_POLL_INTERVAL_SECONDS: ${KORTNY_CONSOLIDATOR_POLL_INTERVAL_SECONDS:-600}
      KORTNY_CONSOLIDATOR_MIN_NEW_ITEMS: ${KORTNY_CONSOLIDATOR_MIN_NEW_ITEMS:-50}
      KORTNY_CONSOLIDATOR_MIN_INTERVAL_HOURS: ${KORTNY_CONSOLIDATOR_MIN_INTERVAL_HOURS:-8}
      KORTNY_CONSOLIDATOR_QUIET_MINUTES: ${KORTNY_CONSOLIDATOR_QUIET_MINUTES:-60}
      KORTNY_CONSOLIDATOR_NIGHTLY_FLOOR_HOURS: ${KORTNY_CONSOLIDATOR_NIGHTLY_FLOOR_HOURS:-24}
      KORTNY_CONSOLIDATOR_ADVISORY_LOCK_KEY: ${KORTNY_CONSOLIDATOR_ADVISORY_LOCK_KEY:-759340187}
      KORTNY_MEMORY_RECENCY_HALF_LIFE_DAYS: ${KORTNY_MEMORY_RECENCY_HALF_LIFE_DAYS:-14}
      KORTNY_KG_STALE_DAYS: ${KORTNY_KG_STALE_DAYS:-45}
      OBSERVABILITY_ENABLED: ${OBSERVABILITY_ENABLED:-true}
      OBSERVABILITY_CAPTURE_CONTENT: ${OBSERVABILITY_CAPTURE_CONTENT:-metadata}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
      OTEL_SERVICE_NAME: ${OTEL_CONSOLIDATOR_SERVICE_NAME:-kortny-consolidator}
      OTEL_TRACE_SAMPLING_RATIO: ${OTEL_TRACE_SAMPLING_RATIO:-1.0}
      FASTEMBED_CACHE_PATH: ${FASTEMBED_CACHE_PATH:-/data/fastembed-cache}
      POSTGRES_URL: postgresql://${POSTGRES_USER:-kortny}:${POSTGRES_PASSWORD:-kortny}@postgres:5432/${POSTGRES_DB:-kortny}
      UV_CACHE_DIR: /tmp/uv-cache
      UV_LINK_MODE: copy
      UV_PROJECT_ENVIRONMENT: /tmp/kortny-venv
    volumes:
      - .:/app
      - uv-cache:/tmp/uv-cache
      - fastembed-cache:/data/fastembed-cache

  dashboard:
    image: ghcr.io/astral-sh/uv:python3.11-bookworm-slim
    working_dir: /app
    command:
      [
        "uv",
        "run",
        "uvicorn",
        "kortny.dashboard.app:create_app",
        "--factory",
        "--host",
        "0.0.0.0",
        "--port",
        "8080",
      ]
    depends_on:
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      DASHBOARD_AUTH_MODE: ${DASHBOARD_AUTH_MODE:-hybrid}
      DASHBOARD_USERNAME: ${DASHBOARD_USERNAME:-kortny}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD:-change-me}
      DASHBOARD_SESSION_SECRET: ${DASHBOARD_SESSION_SECRET:-change-me-dashboard-session-secret}
      DASHBOARD_SECURE_COOKIES: ${DASHBOARD_SECURE_COOKIES:-false}
      DASHBOARD_SLACK_CLIENT_ID: ${DASHBOARD_SLACK_CLIENT_ID:-}
      DASHBOARD_SLACK_CLIENT_SECRET: ${DASHBOARD_SLACK_CLIENT_SECRET:-}
      DASHBOARD_SLACK_REDIRECT_URI: ${DASHBOARD_SLACK_REDIRECT_URI:-}
      DASHBOARD_SLACK_OAUTH_STATE_TTL_MINUTES: ${DASHBOARD_SLACK_OAUTH_STATE_TTL_MINUTES:-10}
      KORTNY_ARTIFACTS_DIR: ${KORTNY_ARTIFACTS_DIR:-/data/artifacts}
      KORTNY_PREVIEW_SIGNING_SECRET: ${KORTNY_PREVIEW_SIGNING_SECRET:-}
      POSTGRES_URL: postgresql://${POSTGRES_USER:-kortny}:${POSTGRES_PASSWORD:-kortny}@postgres:5432/${POSTGRES_DB:-kortny}
      UV_CACHE_DIR: /tmp/uv-cache
      UV_LINK_MODE: copy
      UV_PROJECT_ENVIRONMENT: /tmp/kortny-venv
    ports:
      - "127.0.0.1:${DASHBOARD_HOST_PORT:-8080}:8080"
    volumes:
      - .:/app
      - uv-cache:/tmp/uv-cache
      - task-artifacts:/data/artifacts

  phoenix:
    image: ${PHOENIX_IMAGE:-arizephoenix/phoenix:latest}
    profiles:
      - observability
    environment:
      PHOENIX_HOST: 0.0.0.0
      PHOENIX_PORT: 6006
      PHOENIX_GRPC_PORT: 4317
      PHOENIX_WORKING_DIR: /mnt/data
      PHOENIX_SQL_DATABASE_URL: ${PHOENIX_SQL_DATABASE_URL:-sqlite:////mnt/data/phoenix.db}
      PHOENIX_DEFAULT_RETENTION_POLICY_DAYS: ${PHOENIX_DEFAULT_RETENTION_POLICY_DAYS:-30}
      PHOENIX_TELEMETRY_ENABLED: ${PHOENIX_TELEMETRY_ENABLED:-false}
    ports:
      - "${PHOENIX_HOST_PORT:-6006}:6006"
      - "127.0.0.1:${PHOENIX_GRPC_HOST_PORT:-4317}:4317"
    volumes:
      - phoenix-data:/mnt/data

  temporal:
    image: ${TEMPORAL_IMAGE:-temporalio/temporal:latest}
    profiles:
      - temporal
    command: ["server", "start-dev", "--ip", "0.0.0.0"]
    ports:
      - "${TEMPORAL_HOST_PORT:-7233}:7233"
      - "127.0.0.1:${TEMPORAL_UI_HOST_PORT:-8233}:8233"

  temporal-worker:
    image: ghcr.io/astral-sh/uv:python3.11-bookworm-slim
    profiles:
      - temporal
    working_dir: /app
    command: ["uv", "run", "python", "-m", "kortny.workflow"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      temporal:
        condition: service_started
      sandbox-runner:
        condition: service_healthy
    env_file:
      - .env
    environment:
      KORTNY_WORKFLOW_BACKEND: temporal
      TEMPORAL_ADDRESS: ${TEMPORAL_ADDRESS:-temporal:7233}
      TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE:-default}
      TEMPORAL_TASK_QUEUE: ${TEMPORAL_TASK_QUEUE:-kortny-workflows}
      OBSERVABILITY_ENABLED: ${OBSERVABILITY_ENABLED:-true}
      OBSERVABILITY_CAPTURE_CONTENT: ${OBSERVABILITY_CAPTURE_CONTENT:-metadata}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
      OTEL_SERVICE_NAME: ${OTEL_TEMPORAL_WORKER_SERVICE_NAME:-kortny-temporal-worker}
      OTEL_TRACE_SAMPLING_RATIO: ${OTEL_TRACE_SAMPLING_RATIO:-1.0}
      KORTNY_SANDBOX_RUNNER_URL: ${KORTNY_SANDBOX_RUNNER_URL:-http://sandbox-runner:8090}
      KORTNY_SANDBOX_RUNNER_TIMEOUT_SECONDS: ${KORTNY_SANDBOX_RUNNER_TIMEOUT_SECONDS:-70}
      KORTNY_SANDBOX_DEFAULT_IMAGE: ${KORTNY_SANDBOX_DEFAULT_IMAGE:-ghcr.io/astral-sh/uv:python3.11-bookworm-slim}
      KORTNY_ARTIFACTS_DIR: ${KORTNY_ARTIFACTS_DIR:-/data/artifacts}
      KORTNY_PUBLIC_BASE_URL: ${KORTNY_PUBLIC_BASE_URL:-}
      KORTNY_PREVIEW_SIGNING_SECRET: ${KORTNY_PREVIEW_SIGNING_SECRET:-}
      FASTEMBED_CACHE_PATH: ${FASTEMBED_CACHE_PATH:-/data/fastembed-cache}
      POSTGRES_URL: postgresql://${POSTGRES_USER:-kortny}:${POSTGRES_PASSWORD:-kortny}@postgres:5432/${POSTGRES_DB:-kortny}
      UV_CACHE_DIR: /tmp/uv-cache
      UV_LINK_MODE: copy
      UV_PROJECT_ENVIRONMENT: /tmp/kortny-venv
    volumes:
      - .:/app
      - uv-cache:/tmp/uv-cache
      - task-artifacts:/data/artifacts
      - fastembed-cache:/data/fastembed-cache

  sandbox-docker-proxy:
    image: ${DOCKER_SOCKET_PROXY_IMAGE:-tecnativa/docker-socket-proxy:latest}
    environment:
      CONTAINERS: 1
      IMAGES: 1
      NETWORKS: 1
      INFO: 1
      VERSION: 1
      POST: 1
      EXEC: 1
      BUILD: 0
      AUTH: 0
      SECRETS: 0
      SYSTEM: 0
      VOLUMES: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - sandbox-control

  sandbox-runner:
    image: ghcr.io/astral-sh/uv:python3.11-bookworm-slim
    working_dir: /app
    command: ["uv", "run", "python", "-m", "kortny.sandbox_runner"]
    depends_on:
      sandbox-docker-proxy:
        condition: service_started
    environment:
      DOCKER_HOST: tcp://sandbox-docker-proxy:2375
      KORTNY_SANDBOX_EXECUTION_ENABLED: ${KORTNY_SANDBOX_EXECUTION_ENABLED:-true}
      KORTNY_SANDBOX_RUNNER_NAME: ${KORTNY_SANDBOX_RUNNER_NAME:-kortny-sandbox-runner}
      KORTNY_SANDBOX_DEFAULT_IMAGE: ${KORTNY_SANDBOX_DEFAULT_IMAGE:-ghcr.io/astral-sh/uv:python3.11-bookworm-slim}
      KORTNY_SANDBOX_DEFAULT_NETWORK: ${KORTNY_SANDBOX_DEFAULT_NETWORK:-none}
      KORTNY_SANDBOX_CPUS: ${KORTNY_SANDBOX_CPUS:-1.0}
      KORTNY_SANDBOX_MEMORY_MB: ${KORTNY_SANDBOX_MEMORY_MB:-512}
      KORTNY_SANDBOX_PIDS_LIMIT: ${KORTNY_SANDBOX_PIDS_LIMIT:-128}
      KORTNY_SANDBOX_TIMEOUT_SECONDS: ${KORTNY_SANDBOX_TIMEOUT_SECONDS:-60}
      KORTNY_SANDBOX_SESSIONS_ENABLED: ${KORTNY_SANDBOX_SESSIONS_ENABLED:-true}
      KORTNY_SANDBOX_SESSION_CPUS: ${KORTNY_SANDBOX_SESSION_CPUS:-2.0}
      KORTNY_SANDBOX_SESSION_MEMORY_MB: ${KORTNY_SANDBOX_SESSION_MEMORY_MB:-2048}
      KORTNY_SANDBOX_SESSION_PIDS_LIMIT: ${KORTNY_SANDBOX_SESSION_PIDS_LIMIT:-512}
      KORTNY_SANDBOX_SESSION_WORKSPACE_MB: ${KORTNY_SANDBOX_SESSION_WORKSPACE_MB:-1024}
      KORTNY_SANDBOX_SESSION_IDLE_SECONDS: ${KORTNY_SANDBOX_SESSION_IDLE_SECONDS:-1800}
      KORTNY_SANDBOX_SESSION_MAX_AGE_SECONDS: ${KORTNY_SANDBOX_SESSION_MAX_AGE_SECONDS:-14400}
      KORTNY_SANDBOX_SESSION_EXEC_MAX_TIMEOUT_SECONDS: ${KORTNY_SANDBOX_SESSION_EXEC_MAX_TIMEOUT_SECONDS:-300}
      UV_CACHE_DIR: /tmp/uv-cache
      UV_LINK_MODE: copy
      UV_PROJECT_ENVIRONMENT: /tmp/kortny-venv
    healthcheck:
      test:
        [
          "CMD",
          "uv",
          "run",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8090/health', timeout=2).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    volumes:
      - .:/app
      - uv-cache:/tmp/uv-cache
    networks:
      - default
      - sandbox-control

volumes:
  postgres-data:
  phoenix-data:
  uv-cache:
  task-artifacts:
  fastembed-cache:

networks:
  sandbox-control:
    internal: true
